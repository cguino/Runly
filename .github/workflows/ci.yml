# CI Runly — lint, type-check, test sur chaque PR (plan Lot 0, E0-1).
# Pas d'analytics produit (D10) : seul Sentry crash-only existe côté app,
# son DSN vient d'une variable d'environnement (jamais commité).
# Le build EAS (nécessite EXPO_TOKEN — compte humain) sera ajouté quand les
# comptes seront provisionnés (gate G5).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Installer les dépendances
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Tests
        run: yarn test --ci

  migrations:
    name: Migrations Supabase
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Appliquer les migrations (stub auth Supabase)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          create extension if not exists pgcrypto;
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key default gen_random_uuid());
          create or replace function auth.uid() returns uuid
          language sql stable as $$ select nullif(current_setting('request.jwt.claim.sub', true), '')::uuid $$;
          SQL
          for f in supabase/migrations/*.sql; do
            echo "--- $f"
            psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
